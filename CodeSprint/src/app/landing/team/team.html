<section id="team" class="relative bg-[#0d9488] py-24 overflow-hidden">

  <!-- Bolas decorativas flotantes de fondo -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="ball ball-1"></div>
    <div class="ball ball-2"></div>
    <div class="ball ball-3"></div>
  </div>

  <div class="max-w-7xl mx-auto px-6 lg:px-12 relative z-10">

    <!-- Encabezado centrado con animación fadeUp -->
    <div class="text-center mb-16 animate-fade-up">
      <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full mb-6 team-badge">
        <span class="text-white text-[12px] font-semibold tracking-[0.05em]">EL EQUIPO</span>
      </div>
      <h2 class="text-white mb-4 font-bold leading-tight font-display text-5xl">
        Las mentes detrás de CodeSprint
      </h2>
      <p class="max-w-3xl mx-auto text-[17px] leading-[1.8] text-white/75">
        Un equipo joven, apasionado y comprometido con el código de calidad.
      </p>
    </div>

    <!-- Tarjetas del equipo -->
    <div class="flex flex-wrap justify-center gap-5 mb-20">
      @for (member of team; track member.name; let i = $index) {
        <div class="team-card group text-center transition-all duration-300 hover:-translate-y-2 hover:scale-[1.02] hover:shadow-[0_20px_40px_rgba(0,0,0,0.2)]"
          [style.animation-delay]="(i * 0.1) + 's'">

          <!-- Foto del miembro -->
          <div class="flex justify-center mb-4">
            <div class="relative">
              <div class="w-25 h-25 rounded-full flex items-center justify-center overflow-hidden photo-circle">
                @if (member.photo) {
                  <img
                    [src]="member.photo"
                    [alt]="member.name"
                    [title]="member.name"
                    class="w-full h-full object-cover rounded-full"
                  />
                } @else {
                  <svg class="w-10 h-10 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                  </svg>
                }
              </div>
              <!-- Badge de cámara en esquina inferior derecha de la foto -->
              <div class="absolute bottom-0 right-0 w-5.5 h-5.5 rounded-full bg-white flex items-center justify-center camera-badge">
                <svg class="w-3 h-3 text-[#0d9488]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                  <circle cx="12" cy="13" r="4"/>
                </svg>
              </div>
            </div>
          </div>

          <h3 class="text-white mb-2 font-bold text-[16px]">{{ member.name }}</h3>
          <p class="mb-4 text-[13px] text-white/65">{{ member.role }}</p>

        </div>
      }
    </div>

  </div>

  <!-- Divisor SVG en ola verde claro hacia la siguiente sección -->
  <div class="absolute bottom-0 left-0 right-0">
    <svg viewBox="0 0 1440 100" fill="none" xmlns="http://www.w3.org/2000/svg"
      class="w-full h-25" preserveAspectRatio="none">
      <path d="M0 0C240 33.333 480 50 720 50C960 50 1200 33.333 1440 0V100H0V0Z" fill="#f0fdf4"/>
    </svg>
  </div>

</section>

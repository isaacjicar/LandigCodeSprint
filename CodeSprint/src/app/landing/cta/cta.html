<section class="py-24 bg-[#ecfdf5] relative overflow-hidden">

  <!-- Blobs decorativos de fondo con animación de pulso -->
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-10 right-10 w-64 h-64 rounded-full blob-right blob-teal"></div>
    <div class="absolute bottom-10 left-10 w-64 h-64 rounded-full blob-left blob-emerald"></div>
  </div>

  <div class="max-w-5xl mx-auto px-6 lg:px-12 relative z-10">

    <!-- Card principal con degradado verde -->
    <div class="bg-linear-to-r from-[#0d9488] to-[#10b981] rounded-3xl p-12 lg:p-16 text-center relative overflow-hidden">

      <!-- Textura de puntos semitransparente sobre el degradado -->
      <div class="absolute inset-0 opacity-10 pointer-events-none pattern-dots"></div>

      <div class="relative z-10">

        <!-- Badge " -->
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/20 border border-white/30 mb-6">
          <span class="text-white text-xs font-semibold tracking-widest">¿LISTO PARA EMPEZAR?</span>
        </div>

        <h2 class="text-white mb-6 font-display text-[clamp(36px,5vw,56px)] font-bold leading-tight">
          Convierte tu Visión en Realidad
        </h2>

        <p class="text-white/90 max-w-2xl mx-auto mb-10 leading-relaxed text-lg">
          Agenda una consulta gratuita y descubre cómo podemos ayudarte a construir
          la solución tecnológica perfecta para tu negocio.
        </p>

        <!-- Botones CTA: agendar consulta y enviar mensaje -->
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <!-- Botón agendar consulta: abre Gmail con asunto predefinido -->
             <a
              href="mailto:codesprint@gmail.com?subject=Consulta%20Gratuita%20-%20CodeSprint&body=Hola%2C%20me%20gustar%C3%ADa%20agendar%20una%20consulta%20gratuita."
              aria-label="Agendar consulta gratuita"
              title="Agendar consulta gratuita"
              class="px-8 py-4 rounded-full bg-white text-[#0d9488] hover:bg-white/95 transition-all shadow-xl hover:shadow-2xl inline-flex items-center gap-2 text-base font-semibold">
              Agendar consulta gratuita
              <lucide-icon [img]="ArrowRight" [size]="20"></lucide-icon>
            </a>

            <!-- Botón enviar mensaje: abre Gmail con asunto predefinido -->
            <a
              href="mailto:codesprint@gmail.com?subject=Mensaje%20-%20CodeSprint&body=Hola%2C%20me%20gustar%C3%ADa%20contactarlos."
              aria-label="Enviar mensaje"
              title="Enviar mensaje"
              class="px-8 py-4 rounded-full border-2 border-white text-white hover:bg-white/10 transition-colors inline-flex items-center gap-2 text-base font-semibold">
              <lucide-icon [img]="Mail" [size]="20"></lucide-icon>
              Enviar mensaje
            </a>
        </div>

        <!-- Indicadores de confianza con ícono de check  -->
        <div class="mt-10 pt-8 border-t border-white/20">
          <div class="flex flex-wrap justify-center items-center gap-8 text-white/80 text-sm">
            @for (item of trustItems; track item) {
              <div class="flex items-center gap-2">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                  <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                </svg>
                {{ item }}
              </div>
            }
          </div>
        </div>

      </div>
    </div>
  </div>

</section>

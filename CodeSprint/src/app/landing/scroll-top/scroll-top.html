<!-- Botón flotante "volver arriba" -->
@if (isVisible()) {
  <button
    title="Volver arriba"
    (click)="scrollToTop()"
    class="fixed bottom-8 right-8 z-50 w-12 h-12 rounded-full bg-[#0d9488] text-white shadow-xl hover:bg-[#0d9488]/90 hover:scale-110 active:scale-90 transition-all duration-200 flex items-center justify-center btn-appear"
  >
    <!-- Ícono de flecha hacia arriba -->
    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="18 15 12 9 6 15"/>
    </svg>
  </button>
}

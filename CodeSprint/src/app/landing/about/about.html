<section id="about" class="py-24 bg-white">
  <div class="max-w-7xl mx-auto px-6 lg:px-12">

    <!-- Grid principal: imagen izquierda, contenido derecha -->
    <div class="grid lg:grid-cols-2 gap-16 items-center">

      <!-- Columna izquierda: foto del equipo con tarjeta flotante -->
      <div class="relative">
        <div class="relative rounded-2xl overflow-hidden">
          <img
            src="https://images.unsplash.com/photo-1758873268663-5a362616b5a7?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=1080"
            alt="Team collaboration"
            class="w-full h-125 object-cover"/>
          <div class="absolute inset-0 bg-linear-to-t from-teal-500/20 to-transparent"></div>
        </div>

        <!-- Tarjeta flotante con animación -->
        <div class="absolute -bottom-8 -right-8 bg-white rounded-2xl p-6 shadow-2xl card-float border border-black/10">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-teal-500/10 flex items-center justify-center">
              <lucide-icon [img]="Award" [size]="24" class="text-[#0d9488]"></lucide-icon>
            </div>
            <div>
              <div class="text-[#1a1a1a] text-3xl font-bold font-display">98%</div>
              <div class="text-[#6b7280] text-sm">Satisfacción</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Columna derecha: textos, estadísticas -->
      <div>

        <!-- Badge "Sobre Nosotros" -->
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-teal-500/10 border border-teal-500/20 mb-6">
          <span class="text-[#0d9488] text-xs font-semibold tracking-widest uppercase">
            Sobre Nosotros
          </span>
        </div>

        <h2 class="text-[#1a1a1a] mb-6 font-display text-5xl font-bold leading-tight">
          Innovación que Impulsa Resultados
        </h2>

        <p class="text-[#6b7280] mb-6 leading-relaxed text-[17px]">
          En CodeSprint, creemos que el código es más que líneas de texto...
        </p>

        <p class="text-[#6b7280] mb-8 leading-relaxed text-[17px]">
          Nuestro equipo de desarrolladores apasionados...
        </p>

        <!-- Grid 2x2 con estadísticas dinámicas del componente -->
        <div class="grid grid-cols-2 gap-6 mb-8">
          @for (stat of stats; track stat.label) {
            <div class="flex items-start gap-3">
              <div class="w-10 h-10 rounded-lg bg-teal-500/10 flex items-center justify-center shrink-0">
                <lucide-icon [img]="stat.icon" [size]="20" class="text-[#0d9488]"></lucide-icon>
              </div>
              <div>
                <div class="text-[#1a1a1a] text-2xl font-bold font-display">{{ stat.value }}</div>
                <div class="text-[#6b7280] text-sm">{{ stat.label }}</div>
              </div>
            </div>
          }
        </div>

        <!-- Botón que navega a la sección mission-vision-values -->
        <a
          href="#mission-vision-values"
          aria-label="Conocer más sobre nosotros"
          title="Conocer más sobre nosotros"
          class="px-8 py-4 rounded-full bg-[#0d9488] text-white hover:bg-teal-600 transition-colors inline-flex items-center gap-2 text-base font-semibold">
          Conocer más sobre nosotros
          <span>→</span>
        </a>

      </div>
    </div>
  </div>
</section>
